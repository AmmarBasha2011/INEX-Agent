[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/fetch"
  to = "/.netlify/functions/fetch"
  status = 200

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
